baseURL: "https://ecce.me/"

security:
  funcs:
    getenv:
      - '^GITHUB_TOKEN$'
locale: "en-US"
title: "ecce"
theme: hugo-profile

# Multilingual configuration
defaultContentLanguage: "en"
defaultContentLanguageInSubdir: false
disableLanguages:
  - es
  - fr

languages:
  en:
    label: "English"
    weight: 1
    contentDir: "content"
outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
    - "RSS"

enableRobotsTXT: true

#services:
  #googleAnalytics:
    #id: G-MEASUREMENT_ID
  #disqus:
    #shortname: your-disqus-shortname

pagination:
  pagerSize: 3

markup:
  goldmark:
    renderer:
      unsafe: true

Menus:
  main:
    - identifier: about
      name: About
      url: /about/
      weight: 1
    - identifier: projects
      name: Projects
      url: /#projects
      weight: 2
    #- identifier: writing
    #  name: Writing
    #  url: /logs/
    #  weight: 3
    #Dropdown menu
    # - identifier: dropdown
    #   title: Example dropdown menu
    #   name: Dropdown
    #   weight: 3
    # - identifier: dropdown1
    #   title: example dropdown 1
    #   name: example 1
    #   url: /#
    #   parent: dropdown
    #   weight: 1
    # - identifier: dropdown2
    #   title: example dropdown 2
    #   name: example 2
    #   url: /#
    #   parent: dropdown
    #   weight: 2

params:
  #title: "Ecce Me"
  description: "A personal builder site for coursework, projects, and practical systems."
  # staticPath: ""  # The path to serve the static files from
  favicon: "/images/ecce-logo.png"

  # Whether to serve bootstrap css and js files from CDN or not. Can be set to true, "css" or "js" to choose between
  # serving both, only the css, or only the js files through the CDN. Any other value will make so that CDN is not used.
  # Note the lack of "" in true, it should be of boolean type.
  useBootstrapCDN: false

  # If you want to load dynamically responsive images from Cloudinary
  # This requires your images to be uploaded + hosted on Cloudinary
  # Uncomment and change YOUR_CLOUD_NAME to the Cloud Name in your Cloudinary console
  # cloudinary_cloud_name: "YOUR_CLOUD_NAME"

  # Whether to add mathjax support on all pages. Alternatively, you can opt-in per page by adding `mathjax: true` in the frontmatter.
  mathjax: false

  # Whether the fade animations on the home page will be enabled
  animate: true

  theme:
    disableThemeToggle: false
    defaultTheme: "auto"

  font:
    fontSize: 1rem # default: 1rem
    fontWeight: 400 # default: 400
    lineHeight: 1.5 # default: 1.5
    textAlign: left # default: left

  # color preference
  # When using hex codes for colors, quotations must be used along with the # sign
  color:
    textColor: "#1a1b1e"
    secondaryTextColor: "#5a5f6b"
    textLinkColor: "#007a1e"
    backgroundColor: "#f2f4f2"
    secondaryBackgroundColor: "#e6f0e8"
    primaryColor: "#007a1e"
    secondaryColor: "#edf3ee"

    darkmode:
      textColor: "#e4e6eb"
      secondaryTextColor: "#b0b3b8"
      textLinkColor: "#00FF41"
      backgroundColor: "#18191a"
      secondaryBackgroundColor: "#212529"
      primaryColor: "#00FF41"
      secondaryColor: "#212529"

  # If you want to customize the menu, you can change it here
  navbar:
    align: ms-auto # Left: ms-auto | center: mx-auto | right: me-auto | Default: ms-auto
    # brandLogo: "images/ecce-logo.png" # Logo for the brand | default is the favicon variable
    showBrandLogo: false # Show brand logo in nav bar | default is true
    brandName: "ecce" # Brand name for the brand | default is the title variable
    disableSearch: true
    # searchPlaceholder: "Search"
    stickyNavBar:
      enable : true
      showOnScrollUp : true
    enableSeparator: false
    menus:
      disableAbout: true
      disableExperience: true
      disableEducation: true
      disableProjects: true
      disableAchievements: true
      disableContact: true

  # Hero
  hero:
    enable: true
    intro: "Hi, I'm"
    title: "Logan"
    subtitle: "This is where I put things I've actually built."
    content: ""
    image: ""
    bottomImage:
      enable: true
    # roundImage: true # Make hero image circular | default false
    button:
      enable: false
      name: "Resume"
      url: "#"
      download: true
      newPage: false
    socialLinks:
      fontAwesomeIcons: []
      customIcons: []

  # About
  about:
    enable: false
    title: "About"
    image: "/images/me.png"
    content: |-
      This site serves as a visible trail of work: project writeups, small tools, and systems that make everyday problems easier to handle.

      The goal is simple: move quickly, build things that actually work, and keep an honest record of the process.
    skills:
      enable: true
      title: "Tools and areas I am working with lately:"
      items:
        - "Hugo"
        - "Python"
        - "Java"
        - "Linux"
        - "Automation"
        - "ESP32 / Home Assistant"

  # Experience
  experience:
    enable: false
    # title: "Custom Name"
    items: []

  # Education
  education:
    enable: false
    # title: "Custom Name"
    index: false
    items: []

  # Achievements
  achievements:
    enable: false
    # title: "Custom Name"
    items: []

  # projects
  projects:
    enable: true
    title: "Projects"
    items:
      - title: Ecce.me
        content: "Personal site for documenting coursework, projects, and weekly progress while finishing a CS degree."
        featured:
          name: Writeup
          link: /projects/ecce-me/
        badges:
          - "Hugo"
          - "Cloudflare Pages"
          - "Writing"
        links: []

      - title: Coursework Tracker
        content: "A simple dashboard tracking completed, in-progress, and remaining WGU courses — kept honest and public."
        featured:
          name: View
          link: /courses/
        badges:
          - "WGU"
          - "Data"
          - "Accountability"
        links: []

      - title: Automation and Physical Systems
        content: "Notes and experiments around ESP32 devices, Home Assistant, and small automation scripts."
        featured:
          name: Writeup
          link: /projects/automation-and-physical-systems/
        badges:
          - "Python"
          - "ESP32"
          - "Home Assistant"
        links: []

  coursework:
    completed: "Fill in from degree plan"
    current: "C952 Computer Architecture"
    remaining: "Fill in from degree plan"
    percent: 0
    targetFinish: "3–6 months"
    note: "Fill in completed and remaining counts from the official WGU degree plan."

  #Contact
  contact:
    enable: false
    title: "About"
    content: "The simplest way to follow the work right now is through the site itself. Public profile links will be added here once they are ready."
    btnName: Browse projects
    btnLink: /projects/
    # formspree:
    #   enable: true # `contact.email` value will be ignored
    #   formId: abcdefgh # Take it from your form's endpoint, like 'https://formspree.io/f/abcdefgh'
    #   emailCaption: "Enter your email address"
    #   messageCaption: "Enter your message here"
    #   messageRows: 5

  footer:
    recentPosts:
      path: "logs"
      count: 3
      title: Writing
      enable: false
      disableFeaturedImage: true
    socialNetworks:
      github: ""
      linkedin: ""
      twitter: ""
      instagram: ""
      facebook: ""

  # List pages like blogs and posts
  listPages:
    disableFeaturedImage: true

  # Single pages like blog and post
  singlePages:
    socialShare: true
    readTime:
      enable: true
      content: "min read"
    scrollprogress:
      enable: true
    tags:
      openInNewTab: true

  # For translations
  terms:
    read: "Read"
    toc: "Table Of Contents"
    copyright: "All rights reserved"
    emailText: "Check out this site"

  datesFormat:
    article: "Jan 2, 2006"
    articleList: "Jan 2, 2006"
    articleRecent: "Jan 2, 2006"

  customScripts: '<script src="/js/navbar.js"></script><script src="/js/terminal-animate.js"></script>'
