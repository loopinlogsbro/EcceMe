<footer class="ecce-footer">
  <div class="container py-4">
    <div class="row ecce-footer-row align-items-start">

      {{- partial "sections/footer/recentBlogPosts.html" . -}}

      {{- partial "sections/footer/socialNetwork.html" . -}}

      {{- partial "sections/footer/brand.html" . -}}

    </div>
  </div>

  {{- partial "sections/footer/owl-button.html" . -}}

  {{- partial "sections/footer/copyright.html" . -}}
</footer>

<style>
  /* Three-column footer layout */
  .ecce-footer {
    font-family: 'Roboto Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--text-secondary-color, inherit);
  }
  .ecce-footer-row { gap: 1.5rem 0; }
  .ecce-footer .footer-col {
    flex: 1 1 0;
    min-width: 0;
    padding: 0 1rem;
    text-align: center;
  }
  /* When recentPosts/social are disabled and only brand renders, center it across the row */
  .ecce-footer .footer-col:only-child { flex-basis: 100%; }
  .ecce-footer .footer-col-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--primary-color);
    margin-bottom: 0.6rem;
    font-weight: 700;
  }
  .ecce-footer .footer-list {
    list-style: none;
    padding: 0;
    margin: 0;
    font-size: 0.85rem;
  }
  .ecce-footer .footer-list li { margin-bottom: 0.5rem; line-height: 1.3; }
  .ecce-footer .footer-list a {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px dotted transparent;
    transition: color .2s ease, border-color .2s ease;
  }
  .ecce-footer .footer-list a:hover,
  .ecce-footer .footer-list a:focus-visible {
    color: var(--primary-color);
    border-bottom-color: var(--primary-color);
    outline: none;
  }
  .ecce-footer .footer-date {
    display: block;
    font-size: 0.7rem;
    opacity: 0.55;
    margin-top: 0.1rem;
  }

  /* Social row */
  .ecce-footer .footer-social-list {
    list-style: none;
    padding: 0; margin: 0;
    display: inline-flex;
    gap: 0.9rem;
    justify-content: center;
  }
  .ecce-footer .footer-social-list a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 30px; height: 30px;
    color: inherit;
    opacity: 0.7;
    border-radius: 50%;
    transition: color .2s ease, opacity .2s ease, transform .2s ease;
  }
  .ecce-footer .footer-social-list a:hover,
  .ecce-footer .footer-social-list a:focus-visible {
    color: var(--primary-color);
    opacity: 1;
    transform: translateY(-1px);
    outline: none;
  }

  /* Brand column — triad tagline */
  .ecce-footer .footer-brand p { margin: 0 0 0.35rem; line-height: 1.4; }
  .ecce-footer .ecce-tagline {
    font-size: 1rem;
    letter-spacing: 0.04em;
    margin-bottom: 0.6rem;
  }
  .ecce-footer .ecce-tagline .verb {
    position: relative;
    display: inline-block;
    cursor: help;
    padding: 0.1rem 0.15rem;
    color: inherit;
    transition: color .2s ease, opacity .2s ease, transform .2s ease;
    outline: none;
  }
  .ecce-footer .ecce-tagline:hover .verb,
  .ecce-footer .ecce-tagline:focus-within .verb { opacity: 0.5; }
  .ecce-footer .ecce-tagline .verb:hover,
  .ecce-footer .ecce-tagline .verb:focus,
  .ecce-footer .ecce-tagline .verb:focus-visible {
    opacity: 1;
    color: var(--primary-color);
    transform: translateY(-1px);
  }
  .ecce-footer .ecce-tagline .verb-sep {
    display: inline-block;
    margin: 0 0.25rem;
    color: var(--primary-color);
    opacity: 0.55;
  }

  /* Tooltip — hover, focus, tap (focus via tabindex=0) */
  .ecce-footer .ecce-tagline .translation {
    position: absolute;
    left: 50%;
    bottom: calc(100% + 8px);
    transform: translateX(-50%) translateY(4px);
    background: var(--secondary-background-color, #212529);
    color: var(--text-color, #e4e6eb);
    border: 1px solid var(--primary-color);
    border-radius: 4px;
    padding: 0.2rem 0.5rem;
    font-size: 0.78rem;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity .12s ease, transform .12s ease;
    z-index: 5;
  }
  .ecce-footer .ecce-tagline .translation::after {
    content: '';
    position: absolute;
    top: 100%; left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--primary-color);
  }
  .ecce-footer .ecce-tagline .verb:hover .translation,
  .ecce-footer .ecce-tagline .verb:focus .translation,
  .ecce-footer .ecce-tagline .verb:focus-visible .translation {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ∴ mark — staggered dots, hover blink */
  .ecce-footer .therefore-mark {
    display: inline-block;
    margin-left: 0.35rem;
    color: var(--primary-color);
    text-decoration: none;
    font-size: 1.4em;
    line-height: 1;
    letter-spacing: 0.12em;
    transition: transform .2s ease, filter .2s ease;
  }
  .ecce-footer .therefore-mark:hover,
  .ecce-footer .therefore-mark:focus-visible {
    color: var(--primary-color);
    transform: scale(1.08);
    filter: drop-shadow(0 0 4px var(--primary-color));
    outline: none;
  }
  .ecce-footer .therefore-mark .dot {
    display: inline-block;
    opacity: 0;
    animation: ecce-dot-in 0.6s ease forwards;
  }
  .ecce-footer .therefore-mark .d1 { animation-delay: 0.10s; }
  .ecce-footer .therefore-mark .d2 { animation-delay: 0.30s; }
  .ecce-footer .therefore-mark .d3 { animation-delay: 0.50s; }
  .ecce-footer .therefore-mark:hover .dot,
  .ecce-footer .therefore-mark:focus-visible .dot {
    animation: ecce-dot-blink 1.2s ease-in-out infinite;
  }
  .ecce-footer .therefore-mark:hover .d1,
  .ecce-footer .therefore-mark:focus-visible .d1 { animation-delay: 0s; }
  .ecce-footer .therefore-mark:hover .d2,
  .ecce-footer .therefore-mark:focus-visible .d2 { animation-delay: 0.4s; }
  .ecce-footer .therefore-mark:hover .d3,
  .ecce-footer .therefore-mark:focus-visible .d3 { animation-delay: 0.8s; }

  @keyframes ecce-dot-in {
    from { opacity: 0; transform: translateY(2px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes ecce-dot-blink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.25; }
  }

  /* Brand mark line */
  .ecce-footer .ecce-meta { font-size: 0.85rem; opacity: 0.85; }
  .ecce-footer .ecce-meta .ecce-mark {
    color: var(--primary-color);
    font-weight: 700;
    letter-spacing: 0.08em;
  }
  .ecce-footer .ecce-meta .meta-sep { margin: 0 0.4rem; opacity: 0.6; }

  /* Last revised + pulse dot */
  .ecce-footer .ecce-revised { font-size: 0.78rem; opacity: 0.7; }
  .ecce-footer .ecce-revised .pulse-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--primary-color);
    margin-right: 0.35rem;
    vertical-align: 1px;
    animation: ecce-pulse 2s ease-in-out infinite;
  }
  @keyframes ecce-pulse {
    0%, 100% { opacity: 0.4; box-shadow: 0 0 0 0 var(--primary-color); }
    50%      { opacity: 1.0; box-shadow: 0 0 6px 0 var(--primary-color); }
  }

  /* Copyright line */
  .ecce-footer .ecce-copyright-wrap {
    text-align: center;
    padding: 0.5rem 0 1rem;
    font-size: 0.75rem;
    opacity: 0.6;
  }

  /* Stack columns on narrow screens */
  @media (max-width: 767.98px) {
    .ecce-footer .footer-col { padding: 0.5rem 1rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    .ecce-footer .ecce-tagline .verb,
    .ecce-footer .ecce-tagline .translation,
    .ecce-footer .therefore-mark,
    .ecce-footer .therefore-mark .dot,
    .ecce-footer .ecce-revised .pulse-dot,
    .ecce-footer .footer-social-list a,
    .ecce-footer .footer-list a {
      transition: none !important;
      animation: none !important;
    }
    .ecce-footer .therefore-mark .dot { opacity: 1; }
  }
</style>
