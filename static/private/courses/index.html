<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<title>Course List — Current Term</title>
<style>
  :root {
    --bg: #0f1115; --panel: #161a22; --panel-2: #1d222c; --border: #2a3140;
    --text: #e6e8ec; --muted: #9aa3b2; --accent: #7cc4ff;
    --shadow: 0 2px 10px rgba(0,0,0,0.35);
    --ok: #4cc38a; --ok-bg: rgba(76,195,138,0.14);
    --wip: #7cc4ff; --wip-bg: rgba(124,196,255,0.14);
    --todo: #9aa3b2; --todo-bg: rgba(154,163,178,0.14);
  }
  @media (prefers-color-scheme: light) {
    :root:not([data-theme="dark"]) {
      --bg: #f7f8fa; --panel: #ffffff; --panel-2: #f1f3f7;
      --border: #d8dde5; --text: #1a1d23; --muted: #5a6473;
      --accent: #1f6feb; --shadow: 0 2px 8px rgba(15,17,21,0.08);
      --ok: #1a7f4b; --ok-bg: rgba(26,127,75,0.10);
      --wip: #1f6feb; --wip-bg: rgba(31,111,235,0.10);
      --todo: #5a6473; --todo-bg: rgba(90,100,115,0.10);
    }
  }
  :root[data-theme="light"] {
    --bg: #f7f8fa; --panel: #ffffff; --panel-2: #f1f3f7;
    --border: #d8dde5; --text: #1a1d23; --muted: #5a6473;
    --accent: #1f6feb; --shadow: 0 2px 8px rgba(15,17,21,0.08);
    --ok: #1a7f4b; --ok-bg: rgba(26,127,75,0.10);
    --wip: #1f6feb; --wip-bg: rgba(31,111,235,0.10);
    --todo: #5a6473; --todo-bg: rgba(90,100,115,0.10);
  }
  :root[data-theme="dark"] {
    --bg: #0f1115; --panel: #161a22; --panel-2: #1d222c;
    --border: #2a3140; --text: #e6e8ec; --muted: #9aa3b2;
    --accent: #7cc4ff; --shadow: 0 2px 10px rgba(0,0,0,0.35);
    --ok: #4cc38a; --ok-bg: rgba(76,195,138,0.14);
    --wip: #7cc4ff; --wip-bg: rgba(124,196,255,0.14);
    --todo: #9aa3b2; --todo-bg: rgba(154,163,178,0.14);
  }
  * { box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--text); }
  body { margin: 0; font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.55; font-size: 15px; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 24px 22px 60px; }
  header { padding-bottom: 14px; border-bottom: 1px solid var(--border); margin-bottom: 22px; }
  header h1 { margin: 0 0 4px; font-size: 22px; }
  header .sub { color: var(--muted); font-size: 13px; }
  .back { display: inline-block; margin-bottom: 14px; color: var(--muted); font-size: 13px; text-decoration: none; }
  .back:hover { color: var(--accent); }
  .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
  .card { display: block; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px 18px; color: var(--text); text-decoration: none; transition: border-color 0.15s, transform 0.15s; }
  a.card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .card .top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .card .num { color: var(--accent); font-family: ui-monospace, Consolas, monospace; font-size: 13px; }
  .card .title { display: block; margin-top: 4px; font-weight: 600; }
  .card .desc { display: block; margin-top: 6px; color: var(--muted); font-size: 12.5px; }
  .card .meta { display: block; margin-top: 8px; color: var(--muted); font-size: 12px; }
  .card.is-static { opacity: 0.92; cursor: default; }
  .pill { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px; white-space: nowrap; }
  .pill.ok   { color: var(--ok);   background: var(--ok-bg); }
  .pill.wip  { color: var(--wip);  background: var(--wip-bg); }
  .pill.todo { color: var(--todo); background: var(--todo-bg); }
  .empty { color: var(--muted); font-size: 14px; padding: 18px 0; }
  .theme-btn {
    position: fixed; top: 14px; right: 14px; z-index: 50;
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border); box-shadow: var(--shadow);
    cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
    font-size: 18px; line-height: 1; padding: 0;
    transition: background 0.15s ease, transform 0.15s ease;
  }
  .theme-btn:hover { background: var(--panel-2); transform: translateY(-1px); }
  .theme-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .theme-btn .icon-sun, .theme-btn .icon-moon { display: none; }
  :root[data-theme="dark"] .theme-btn .icon-sun,
  :root:not([data-theme]) .theme-btn .icon-sun { display: inline; }
  :root[data-theme="light"] .theme-btn .icon-moon { display: inline; }
  @media (prefers-color-scheme: light) {
    :root:not([data-theme]) .theme-btn .icon-sun { display: none; }
    :root:not([data-theme]) .theme-btn .icon-moon { display: inline; }
  }
</style>
<script>
  (function() {
    try {
      var saved = localStorage.getItem('study-guide-theme');
      if (saved === 'light' || saved === 'dark') {
        document.documentElement.setAttribute('data-theme', saved);
      }
    } catch (e) {}
  })();
</script>
</head>
<body>
<button id="themeBtn" class="theme-btn" type="button" aria-label="Toggle dark mode" title="Toggle theme">
  <span class="icon-sun" aria-hidden="true">&#9788;</span>
  <span class="icon-moon" aria-hidden="true">&#9790;</span>
</button>
<div class="wrap">
  <a class="back" href="../">&larr; Menu</a>
  <header>
    <h1 id="pageTitle">Course List</h1>
    <div class="sub" id="pageSub">Current term</div>
  </header>
  <div class="grid" id="grid"></div>
</div>

<script src="courses.js"></script>
<script>
  (function() {
    var data = (window.COURSES && Array.isArray(window.COURSES.courses)) ? window.COURSES : { courses: [] };
    var grid = document.getElementById('grid');

    // Header reflects the term from the data file.
    var sub = data.term || 'Current term';
    if (data.termWindow) sub += ' · ' + data.termWindow;
    document.getElementById('pageSub').textContent = sub;

    function pillClass(status) {
      var s = (status || '').toLowerCase();
      if (s.indexOf('complete') !== -1 || s.indexOf('pass') !== -1) return 'ok';
      if (s.indexOf('progress') !== -1 || s.indexOf('enroll') !== -1 || s.indexOf('active') !== -1) return 'wip';
      return 'todo';
    }

    function cardEl(c) {
      var hasLink = !!c.link;
      var el = document.createElement(hasLink ? 'a' : 'div');
      el.className = 'card' + (hasLink ? '' : ' is-static');
      if (hasLink) el.href = c.link;

      var top = document.createElement('div');
      top.className = 'top';
      var num = document.createElement('span');
      num.className = 'num';
      num.textContent = c.code || '';
      top.appendChild(num);
      if (c.status) {
        var pill = document.createElement('span');
        pill.className = 'pill ' + pillClass(c.status);
        pill.textContent = c.status;
        top.appendChild(pill);
      }
      el.appendChild(top);

      var title = document.createElement('span');
      title.className = 'title';
      title.textContent = c.title || '';
      el.appendChild(title);

      if (c.note) {
        var desc = document.createElement('span');
        desc.className = 'desc';
        desc.textContent = c.note;
        el.appendChild(desc);
      }

      var bits = [];
      if (c.units != null && c.units !== '') bits.push(c.units + ' CU' + (c.units == 1 ? '' : 's'));
      if (hasLink) bits.push(/^https?:/i.test(c.link) ? 'Opens in WGU portal' : 'Study guides →');
      if (bits.length) {
        var meta = document.createElement('span');
        meta.className = 'meta';
        meta.textContent = bits.join(' · ');
        el.appendChild(meta);
      }
      return el;
    }

    if (!data.courses.length) {
      var empty = document.createElement('div');
      empty.className = 'empty';
      empty.textContent = 'No courses yet — add this term’s courses in courses.js.';
      grid.appendChild(empty);
    } else {
      data.courses.forEach(function(c) { grid.appendChild(cardEl(c)); });
    }
  })();
</script>

<script>
  (function() {
    var root = document.documentElement;
    var btn = document.getElementById('themeBtn');
    var mq = window.matchMedia('(prefers-color-scheme: light)');
    function currentTheme() {
      var t = root.getAttribute('data-theme');
      if (t === 'light' || t === 'dark') return t;
      return mq.matches ? 'light' : 'dark';
    }
    function updateLabel() {
      var t = currentTheme();
      btn.setAttribute('aria-label', t === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
      btn.setAttribute('title', t === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
    }
    btn.addEventListener('click', function() {
      var next = currentTheme() === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      try { localStorage.setItem('study-guide-theme', next); } catch (e) {}
      updateLabel();
    });
    mq.addEventListener && mq.addEventListener('change', function() {
      var saved = null;
      try { saved = localStorage.getItem('study-guide-theme'); } catch (e) {}
      if (!saved) updateLabel();
    });
    updateLabel();
  })();
</script>
</body>
</html>
