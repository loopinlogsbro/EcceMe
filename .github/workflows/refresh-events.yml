name: Refresh GitHub events fallback

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch events
        run: |
          curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "User-Agent: EcceMe-build" \
            "https://api.github.com/users/loopinlogsbro/events/public" \
            > /tmp/events.json
          # Only accept a JSON array; rate-limit/error responses are objects
          jq -e 'type == "array"' /tmp/events.json > /dev/null
          mv /tmp/events.json data/github-events.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/github-events.json
          git diff --cached --quiet || git commit -m "chore: refresh github events fallback data"
          git push
